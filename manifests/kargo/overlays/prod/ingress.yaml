apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kargo-raspberrypi-tailscale
  annotations:
    tailscale.com/funnel: "false"
spec:
  ingressClassName: tailscale
  rules:
  - http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: kargo-api
            port:
              number: 8080
  tls:
  - hosts:
    - kargo-raspberrypi
